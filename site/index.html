<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Jason Alpha Daily 每日金融简报">
  <meta property="og:title" content="Jason Alpha Daily">
  <meta property="og:description" content="工作日更新的全球市场、宏观政策与行动简报">
  <title>Jason Alpha Daily</title>
  <style>
    :root{--navy:#0B1736;--blue:#1E4B8F;--cyan:#3F8CFF;--ink:#172033;--muted:#6B7485;--line:#E2E8F1;--soft:#F3F6FA;--green:#0E9F6E;--red:#D9485F;--amber:#D99213;--white:#fff}
    *{box-sizing:border-box}html{background:#DDE3ED}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--ink);background:#DDE3ED}.toolbar{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;gap:18px;padding:10px max(18px,calc((100vw - 1440px)/2));background:rgba(11,23,54,.96);color:#fff;box-shadow:0 6px 24px rgba(11,23,54,.2)}.toolbar-title{font-weight:750;letter-spacing:.2px}.toolbar-actions{display:flex;align-items:center;gap:9px}.toolbar label{font-size:12px;color:#BFD0EF}.toolbar select,.toolbar button{height:34px;border:1px solid rgba(255,255,255,.22);border-radius:8px;color:#fff;background:#152A55;padding:0 11px;font:inherit;font-size:12px}.toolbar button{cursor:pointer}.toolbar button:hover,.toolbar button:focus-visible{background:#1E4B8F;outline:2px solid #78A9FF;outline-offset:1px}.page{width:min(1440px,100%);min-height:1880px;margin:0 auto;background:#F7F9FC;padding:34px 44px 74px;overflow:hidden}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.brand{display:flex;gap:13px;align-items:center}.mark{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--navy),var(--cyan));display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px}.brand h1{margin:0;font-size:28px;color:var(--navy)}.subtitle{font-size:12px;color:var(--muted);letter-spacing:.8px;margin-top:3px}.datebox{text-align:right}.date{font-weight:800;color:var(--navy);font-size:17px}.cutoff{font-size:11px;color:var(--muted);margin-top:4px}.hero{background:linear-gradient(135deg,#0B1736,#123B76);color:#fff;border-radius:16px;padding:18px 22px;display:grid;grid-template-columns:1.8fr .7fr;gap:18px;align-items:center;box-shadow:0 10px 28px rgba(11,23,54,.15)}.hero h2{font-size:23px;margin:0 0 7px}.hero p{margin:0;color:#D9E6FA;font-size:14px;line-height:1.6}.status{text-align:right}.pill{display:inline-block;padding:5px 10px;background:rgba(255,255,255,.13);border-radius:999px;font-size:10px;letter-spacing:.5px}.signal{font-size:32px;font-weight:800;margin-top:8px}.signal small{font-size:12px;color:#BFD0EF}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:12px 0}.card,.panel{background:#fff;border:1px solid var(--line);box-shadow:0 4px 12px rgba(28,44,76,.04)}.card{border-radius:13px;padding:13px 15px}.label{font-size:11px;color:var(--muted);margin-bottom:6px}.value{font-size:25px;font-weight:800;color:var(--navy);line-height:1.05}.unit{font-size:12px;color:#7A8495}.delta{font-size:11px;font-weight:700;margin-top:6px}.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}.progress{height:5px;background:#E7ECF4;border-radius:6px;margin-top:8px;overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan))}.layout{display:grid;grid-template-columns:1.18fr .82fr;gap:12px;margin-top:12px}.panel{border-radius:14px;padding:15px 17px}.panel h3{font-size:16px;color:var(--navy);margin:0 0 9px}.hint{font-size:10px;color:var(--muted);margin:-4px 0 9px}.marketgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.metric{background:var(--soft);border-radius:10px;padding:9px 10px}.metric .n{font-size:11px;color:var(--muted)}.metric .v{font-size:17px;font-weight:800;color:var(--navy);margin-top:3px}.metric .c{font-size:11px;font-weight:700;margin-top:2px}.bars{display:flex;flex-direction:column;gap:8px}.barrow{display:grid;grid-template-columns:70px 1fr 44px;align-items:center;gap:8px;font-size:11px}.bar{height:8px;background:#EDF1F7;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;border-radius:999px}.sector-up{background:linear-gradient(90deg,#63CBAA,var(--green))}.sector-down{background:linear-gradient(90deg,#F39AA9,var(--red))}.health{display:grid;grid-template-columns:130px 1fr;gap:14px;align-items:center}.gauge{width:118px;height:118px;border-radius:50%;display:grid;place-items:center;position:relative}.gauge:before{content:"";width:84px;height:84px;border-radius:50%;background:#fff;position:absolute}.gauge .num{position:relative;font-size:27px;font-weight:800;color:var(--navy);text-align:center}.gauge small{display:block;font-size:9px;color:var(--muted)}.checks{display:grid;grid-template-columns:1fr 1fr;gap:6px}.check{background:var(--soft);border-radius:8px;padding:8px 9px;display:flex;justify-content:space-between;font-size:10px}.check b{color:var(--navy)}table{width:100%;border-collapse:collapse}th{font-size:10px;color:var(--muted);text-align:left;padding:0 0 7px;border-bottom:1px solid var(--line)}td{font-size:11px;padding:7px 0;border-bottom:1px solid #EEF2F7}tr:last-child td{border-bottom:none}td:nth-child(2),td:nth-child(3){text-align:right}.ticker{font-weight:800;color:var(--navy)}.split3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:12px}.list{display:flex;flex-direction:column;gap:7px}.item{display:flex;justify-content:space-between;gap:10px;padding-bottom:6px;border-bottom:1px solid #EEF2F7;font-size:11px}.item:last-child{border-bottom:none}.item b{color:var(--navy)}.item span{color:var(--muted);text-align:right}.action{background:linear-gradient(135deg,#F3F7FD,#EEF4FB);border:1px solid #CFDAEA;box-shadow:0 6px 16px rgba(28,44,76,.08)}.action h3{color:var(--navy);font-size:18px;margin-bottom:11px}.action h3:after{content:"TODAY'S DECISION";font-size:9px;letter-spacing:1.2px;color:#6681AA;margin-left:10px;font-weight:600}.actiongrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.act{background:#fff;border:1px solid #DCE4F0;border-radius:10px;padding:11px 12px;box-shadow:0 2px 7px rgba(28,44,76,.07);min-height:61px}.act strong{font-size:14px;display:block;margin-bottom:4px}.act span{font-size:10px;color:#596579;line-height:1.45}.act:nth-child(1){border-left:4px solid var(--green)}.act:nth-child(2){border-left:4px solid var(--green)}.act:nth-child(3){border-left:4px solid var(--red)}.act:nth-child(4){border-left:4px solid var(--amber)}.footer{display:flex;justify-content:space-between;margin-top:18px;padding-top:11px;border-top:1px solid var(--line);font-size:9px;color:var(--muted)}.loading{padding:80px;text-align:center;color:var(--muted)}
    @media(max-width:900px){.toolbar{position:relative;padding:10px 14px;align-items:flex-start}.toolbar-title{font-size:13px}.toolbar-actions{flex-wrap:wrap;justify-content:flex-end}.page{min-height:0;padding:22px 16px 44px}.topbar{align-items:flex-start}.brand h1{font-size:21px}.subtitle{font-size:9px}.cutoff{max-width:155px}.hero{grid-template-columns:1fr}.status{text-align:left}.cards{grid-template-columns:repeat(2,1fr)}.cards .card:last-child{grid-column:1/-1}.layout,.split3{grid-template-columns:1fr}.actiongrid{grid-template-columns:1fr 1fr}.value{font-size:21px}}
    @media(max-width:520px){.toolbar{display:block}.toolbar-actions{margin-top:9px;justify-content:flex-start}.topbar{display:block}.datebox{text-align:left;margin:12px 0}.marketgrid{grid-template-columns:repeat(2,1fr)}.health{grid-template-columns:1fr}.gauge{margin:auto}.checks{grid-template-columns:1fr}.actiongrid{grid-template-columns:1fr}.hero h2{font-size:19px}.signal{font-size:25px}.footer{display:block;line-height:1.8}}
    @media print{html,body{background:#fff}.toolbar{display:none}.page{width:1440px;min-height:1880px;padding:34px 44px 74px}}
  </style>
</head>
<body>
  <nav class="toolbar" aria-label="简报工具栏">
    <div class="toolbar-title">Jason Alpha Daily · 历史简报</div>
    <div class="toolbar-actions"><label for="dateSelect">选择日期</label><select id="dateSelect" aria-label="选择简报日期"></select><button id="printButton" type="button">打印 / 保存 PDF</button></div>
  </nav>
  <main id="briefing" class="page"><div class="loading">正在载入今日简报…</div></main>
  <script src="./data/archive.js"></script>
  <script defer src="./app.js"></script>
</body>
</html>
