name: Daily Financial Briefing

on:
  push:
    branches: [main]
    paths: ["site/**", "automation/**", ".github/workflows/daily-briefing.yml"]
  schedule:
    - cron: "0 2 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap site source
        if: ${{ hashFiles('automation/generate_daily.py') == '' }}
        env:
          SITE_ARCHIVE: 
        run: |
          printf '%s' "$SITE_ARCHIVE" | base64 --decode > /tmp/jad-bootstrap.tgz
          tar -xzf /tmp/jad-bootstrap.tgz
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate weekday briefing
        env:
          TZ: Asia/Shanghai
        run: |
          python automation/generate_daily.py || {
            echo "::warning::Live market feed unavailable; deploying the latest verified report."
            test -f site/data/archive.js
          }
      - name: Save site source and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site automation
          git diff --cached --quiet || git commit -m "Update daily briefing [skip ci]"
          git push
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
